<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FI Quotation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app">
    <section id="loginPage" class="auth-page">
      <div class="auth-card">
        <div class="brand">
          <div class="brand-mark">FI</div>
          <div>
            <h1>ระบบใบเสนอราคา</h1>
            <p>Forward Insight</p>
          </div>
        </div>

        <form id="loginForm" class="form-stack">
          <div class="field">
            <label for="loginEmail">อีเมล</label>
            <input id="loginEmail" type="email" placeholder="name@company.com" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="loginPassword">รหัสผ่าน</label>
            <input id="loginPassword" type="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" required />
          </div>

          <button id="loginButton" type="submit" class="btn btn-primary btn-full">
            เข้าสู่ระบบ
          </button>

          <div id="loginError" class="alert alert-error hidden"></div>
        </form>
      </div>
    </section>

    <section id="appShell" class="app-shell hidden">
      <aside class="sidebar app-header">
        <div class="sidebar-brand app-brand">
          <div class="brand-mark small">FI</div>
          <div>
            <strong>Forward Insight</strong>
            <span>ระบบใบเสนอราคา</span>
          </div>
        </div>

        <button id="mobileMenuButton" type="button" class="icon-button mobile-menu-button" aria-label="เปิดเมนู">
          ☰
        </button>

        <nav id="sidebarMenu" class="sidebar-menu app-nav"></nav>

        <div class="header-spacer"></div>

        <div class="company-chip">บริษัท A</div>

        <div class="user-panel app-user-panel">
          <div class="user-meta">
            <strong id="userName">-</strong>
            <span id="userRole">-</span>
          </div>
          <button id="logoutButton" class="btn btn-ghost">ออกจากระบบ</button>
        </div>
      </aside>

      <main class="main app-main">
        <header class="topbar page-heading">
          <div>
            <h2 id="pageTitle">แดชบอร์ด</h2>
            <p id="pageSubtitle"></p>
          </div>
        </header>

        <section id="setupWarning" class="alert alert-warning hidden"></section>

        <section id="pageContent" class="page-content">
          <div class="loading-card">กำลังโหลดข้อมูล...</div>
        </section>
      </main>
    </section>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <div id="pageBusyOverlay" class="page-busy-overlay hidden" aria-hidden="true">
      <div class="page-busy-card">
        <div class="spinner"></div>
        <strong>กำลังดำเนินการ</strong>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
